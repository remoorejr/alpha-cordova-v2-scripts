services:
  builder:
    image: remoorejr/alpha-cordova-android-build:latest
    container_name: cordova-builder
    user: cordovauser
    working_dir: /home/cordovauser/app
    volumes:
      - .:/home/cordovauser/app
      - /home/cordovauser/.config
      - gradle_cache:/home/cordovauser/.gradle
      - npm_cache:/home/cordovauser/.npm
    environment:
      - GIT_USER_NAME=Your Name
      - GIT_USER_EMAIL=your@email.com
      - GRADLE_USER_HOME=/home/cordovauser/.gradle
      - NPM_CONFIG_CACHE=/home/cordovauser/.npm
      - npm_config_prefix=/home/cordovauser/.npm-global
     
    tty: true
    stdin_open: true

volumes:
  gradle_cache:
  npm_cache: