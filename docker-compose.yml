services:
  builder:
    # Point directly to your Hub image for v2.0
    image: remoorejr/alpha-cordova-android-build:latest
    container_name: alpha_cordova_android_build
    
    # Keeps your host file permissions clean (UID 1000)
    user: "1000:1000"
    privileged: true
    working_dir: /app

    volumes:
      - .:/app
      - gradle_cache:/home/cordovauser/.gradle
      - npm_cache:/home/cordovauser/.npm

    environment:
      - HOME=/home/cordovauser
      - GRADLE_USER_HOME=/home/cordovauser/.gradle
      - GRADLE_OPTS=-Dorg.gradle.native.dir=/tmp/.gradle-native -Dorg.gradle.warning.mode=none
      - ADB_SERVER_SOCKET=tcp:host.docker.internal:5037
      # --- NEW FOR v2.0 (Required for Auto-Tagging) ---
      - GIT_AUTHOR_NAME=Your Name
      - GIT_AUTHOR_EMAIL=your@email.com
      - GIT_COMMITTER_NAME=Your Name
      - GIT_COMMITTER_EMAIL=your@email.com
    
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  gradle_cache:
  npm_cache: